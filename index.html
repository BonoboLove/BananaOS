<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaOS v1.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div id="desktop"></div>
    <div id="taskbar">
        <div id="taskbar-apps">
            <div class="app-tab" id="start-button">🍌</div> 
            <div class="app-tab" id="browser"></div>
            <div class="app-tab" id="file-explorer"></div>
            <div class="app-tab" id="terminal"></div>
        </div>
        <div id="system-tray">
            <div class="tray-icons" id="wifi"></div>
            <div class="tray-icons" id="sound"></div>
            <div class="tray-icons" id="battery"></div>
            <div id="time-wrapper">
                <span id="clock">12:00 PM</span>
                <span id="date">6/17/26</span>
            </div>
            <div class="tray-icons" id="noti-bell"></div>
        </div>
    </div>
</body>
</html>
