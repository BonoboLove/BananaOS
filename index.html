<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaOS v1.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div id="desktop"></div>
    <div id="taskbar">
        <div id="start-button">🍌</div>
        <div id="taskbar-apps">
            <div class="app-tab" id="browser"></div>
            <div class="app-tab" id="file_explorer"></div>
            <div class="app-tab" id="terminal"></div>
        </div>
        <div id="system-tray">
            <span id="clock">12:00 PM</span>
            <span id="date">6/17/26</span>
            <div id="sound"></div>
            <div id="noti_bell"></div>
        </div>
    </div>
</body>
</html>
